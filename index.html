<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climate Tracker</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
</head>
<body>
    <h1>Climate Tracker</h1>
    <div>
        <h2>Weather Updates</h2>
        <div id="weather"></div>
    </div>
    <div>
        <h2>Temperature Trends</h2>
        <div id="temperature-trends"></div>
    </div>
    <div>
        <h2>Air Quality Monitoring</h2>
        <div id="air-quality"></div>
    </div>

    <script>
        const lat = 35.6895; // Example latitude
        const lon = 139.6917; // Example longitude

        function fetchWeather() {
            $.get(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,precipitation_sum`, function(data) {
                $('#weather').html(`<p>Current Temperature: ${data.hourly.temperature_2m[0]} °C</p>`);
                // Additional code for displaying trends can be added here
            });
        }

        function fetchAirQuality() {
            $.get(`https://api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}`, function(data) {
                $('#air-quality').html(`<p>Air Quality Index: ${data.current.air_quality.index}</p>`);
                // Additional code for air quality details can be added here
            });
        }

        $(document).ready(function() {
            fetchWeather();
            fetchAirQuality();
        });
    </script>
</body>
</html>
